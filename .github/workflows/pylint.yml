name: Pylint

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        python-version: ['3.7', '3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        exclude:
        - os: ubuntu-24.04
          python-version: 3.7
        - os: ubuntu-22.04
          python-version: 3.8
        - os: ubuntu-22.04
          python-version: 3.9
        - os: ubuntu-22.04
          python-version: 3.10
        - os: ubuntu-22.04
          python-version: 3.11
        - os: ubuntu-22.04
          python-version: 3.12
        - os: ubuntu-22.04
          python-version: 3.13
        - os: ubuntu-22.04
          python-version: 3.14
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
      - name: Lint with pylint
        run: pylint -E check_idrac
